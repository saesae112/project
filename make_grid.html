<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>격자 생성기</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── 사이드바 ── */
.sidebar {
  width: 260px;
  min-width: 260px;
  height: 100vh;
  background: #ffffff;
  border-right: 1px solid #e5e7eb;
  display: flex;
  flex-direction: column;
  z-index: 1000;
  box-shadow: 2px 0 12px rgba(0,0,0,0.06);
}

.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid #f0f2f5;
}

.sidebar-title {
  font-size: 15px;
  font-weight: 600;
  color: #111827;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-title .icon {
  width: 28px; height: 28px;
  background: #3b82f6;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

.sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── 섹션 ── */
.section-label {
  font-size: 10px;
  font-weight: 600;
  color: #9ca3af;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* ── 버튼 ── */
.btn {
  width: 100%;
  padding: 9px 14px;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.12); }
.btn:not(:disabled):active { transform: translateY(0); }

.btn-primary   { background:#3b82f6; color:#fff; border-color:#2563eb; }
.btn-success   { background:#10b981; color:#fff; border-color:#059669; }
.btn-warning   { background:#f59e0b; color:#fff; border-color:#d97706; }
.btn-danger    { background:#fff;    color:#ef4444; border-color:#fecaca; }
.btn-secondary { background:#f9fafb; color:#374151; border-color:#e5e7eb; }
.btn-download  { background:#6366f1; color:#fff; border-color:#4f46e5; }

.btn-group { display: flex; flex-direction: column; gap: 6px; }

/* ── 슬라이더 ── */
.slider-wrap { background: #f9fafb; border-radius: 8px; padding: 12px; border: 1px solid #e5e7eb; }
.slider-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.slider-title { font-size: 12px; font-weight: 500; color: #374151; }
.slider-val { font-size: 13px; font-weight: 600; color: #3b82f6; background: #eff6ff; padding: 2px 8px; border-radius: 5px; }
input[type=range] { width: 100%; accent-color: #3b82f6; }

/* ── 파일명 입력 ── */
.filename-wrap { display: flex; flex-direction: column; gap: 5px; }
.filename-label { font-size: 11px; color: #6b7280; }
.filename-input {
  width: 100%;
  padding: 8px 10px;
  border-radius: 7px;
  border: 1px solid #e5e7eb;
  background: #f9fafb;
  font-size: 12px;
  font-family: 'Courier New', monospace;
  color: #374151;
  outline: none;
  transition: border-color 0.15s;
}
.filename-input:focus { border-color: #3b82f6; background: #fff; }
.filename-hint { font-size: 10px; color: #9ca3af; }

/* ── 상태 표시 ── */
.status-box {
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 11px;
  line-height: 1.5;
  background: #fffbeb;
  border: 1px solid #fde68a;
  color: #92400e;
  min-height: 38px;
}
.status-box.info   { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
.status-box.success{ background: #f0fdf4; border-color: #bbf7d0; color: #14532d; }
.status-box.loading{ background: #f5f3ff; border-color: #ddd6fe; color: #4c1d95; }

/* ── 꼭짓점 목록 ── */
.coords-list { display: flex; flex-direction: column; gap: 3px; }
.coord-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  border-radius: 6px;
  background: #f9fafb;
  border: 1px solid #f0f2f5;
}
.coord-num {
  width: 18px; height: 18px;
  background: #3b82f6;
  color: #fff;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.coord-text { font-size: 10px; color: #6b7280; font-family: monospace; }
.coords-empty { font-size: 11px; color: #d1d5db; text-align: center; padding: 8px 0; }

/* ── 통계 카드 ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat-card {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 8px 10px;
}
.stat-card-label { font-size: 9px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 2px; }
.stat-card-val { font-size: 15px; font-weight: 600; color: #111827; }
.stat-card-val.red { color: #ef4444; }
.stat-card-val.blue { color: #3b82f6; }

/* ── 프로그레스 ── */
.progress-bar { height: 4px; background: #e5e7eb; border-radius: 2px; overflow: hidden; display: none; margin-top: 8px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #6366f1); border-radius: 2px; width: 0%; transition: width 0.1s; }

/* ── 지도 영역 ── */
.map-wrap { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }
.leaflet-container { background: #e8ecf0; }

/* ── CSV 미리보기 ── */
.preview-panel {
  position: absolute;
  bottom: 16px; right: 16px;
  z-index: 1000;
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 10px;
  max-width: 320px;
  max-height: 180px;
  overflow-y: auto;
  display: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}
.preview-title { font-size: 9px; font-weight: 600; color: #9ca3af; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
pre { color: #374151; line-height: 1.8; font-size: 10px; }
.head { color: #3b82f6; font-weight: 600; }

/* ── 스크롤바 ── */
.sidebar-body::-webkit-scrollbar { width: 4px; }
.sidebar-body::-webkit-scrollbar-track { background: transparent; }
.sidebar-body::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

/* ── 구분선 ── */
.divider { height: 1px; background: #f0f2f5; margin: 0 -16px; }

canvas { display: none; }
</style>
</head>
<body>

<!-- ── 사이드바 ── -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">
      <div class="icon">🗺</div>
      격자 생성기
    </div>
  </div>

  <div class="sidebar-body">

    <!-- 상태 -->
    <div>
      <div class="section-label">상태</div>
      <div id="status" class="status-box">지도를 클릭해서 꼭짓점을 찍으세요 (최소 3개)</div>
    </div>

    <!-- 격자 크기 -->
    <div>
      <div class="section-label">격자 크기</div>
      <div class="slider-wrap">
        <div class="slider-row">
          <span class="slider-title">한 변의 길이</span>
          <span class="slider-val" id="gridMVal">100m</span>
        </div>
        <input type="range" id="gridM" min="50" max="500" value="100" step="50"
               oninput="document.getElementById('gridMVal').textContent=this.value+'m'">
      </div>
    </div>

    <!-- 작업 버튼 -->
    <div>
      <div class="section-label">작업</div>
      <div class="btn-group">
        <button class="btn btn-warning" id="waterBtn" onclick="detectWater()" disabled>
          💧 수계 감지
        </button>
        <button class="btn btn-success" id="gridBtn" onclick="generateGrid()" disabled>
          ⊞ 격자 생성
        </button>
      </div>
    </div>

    <!-- 저장 -->
    <div>
      <div class="section-label">저장</div>
      <div class="filename-wrap" style="margin-bottom:8px;">
        <div class="filename-label">파일명 (선택)</div>
        <input type="text" id="csvFilename" class="filename-input" placeholder="자동 생성">
        <div class="filename-hint">.csv + _polygon.json 으로 저장됩니다</div>
      </div>
      <button class="btn btn-download" id="csvBtn" onclick="downloadCSV()" disabled>
        ⬇ CSV + JSON 저장
      </button>
    </div>

    <div class="divider"></div>

    <!-- 편집 -->
    <div>
      <div class="section-label">편집</div>
      <div class="btn-group">
        <button class="btn btn-secondary" id="undoBtn" onclick="undoPoint()" disabled>
          ↩ 마지막 꼭짓점 취소
        </button>
        <button class="btn btn-danger" id="clearBtn" onclick="clearAll()" disabled>
          ✕ 전체 초기화
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 꼭짓점 목록 -->
    <div>
      <div class="section-label">꼭짓점</div>
      <div id="coordsList" class="coords-list">
        <div class="coords-empty">아직 없음</div>
      </div>
    </div>

    <!-- 결과 통계 -->
    <div id="statsCard" style="display:none;">
      <div class="section-label">결과</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">전체 후보</div>
          <div class="stat-card-val blue" id="r-total">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">수계 제외</div>
          <div class="stat-card-val red" id="r-water">—</div>
        </div>
        <div class="stat-card" style="grid-column:1/-1;">
          <div class="stat-card-label">최종 격자 (격자 크기)</div>
          <div class="stat-card-val blue" id="r-count">—</div>
          <div style="font-size:10px;color:#9ca3af;margin-top:1px;" id="r-size"></div>
        </div>
      </div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

  </div>
</div>

<!-- ── 지도 ── -->
<div class="map-wrap">
  <div id="map"></div>
  <canvas id="tileCanvas"></canvas>

  <div class="preview-panel" id="preview">
    <div class="preview-title">CSV 미리보기 (앞 10행)</div>
    <pre id="previewText"></pre>
  </div>
</div>

<script>
// ── 지도 ──────────────────────────────────────────────────────────
// 수계 감지를 위해 일반 OSM 타일 사용 (밝은 배경)
const map = L.map('map', { zoomControl:true }).setView([37.555, 126.928], 14);

// 수계 감지용: 밝은 타일 (물이 파란색으로 명확히 표시됨)
const detectTile = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution:'© OSM', maxZoom:19 }
).addTo(map);

let points=[], markers=[], polyline=null, polygon=null;
let gridRects=[], gridData=[];
let waterSet = new Set();  // 수계로 감지된 격자 id 세트
let allCandidates = [];    // 구역 내 모든 후보 격자
let waterDetected = false;
let gridDone = false;

// ── 클릭 → 꼭짓점 ────────────────────────────────────────────────
map.on('click', e => {
  if (gridDone) return;
  const { lat, lng } = e.latlng;
  points.push({ lat, lng });
  const m = L.circleMarker([lat,lng], {
    radius:6, fillColor:'#facc15', color:'#fff', weight:2, fillOpacity:1
  }).bindTooltip(`${points.length}번 (${lat.toFixed(5)}, ${lng.toFixed(5)})`).addTo(map);
  markers.push(m);
  if (polyline) map.removeLayer(polyline);
  if (points.length >= 2)
    polyline = L.polyline(points.map(p=>[p.lat,p.lng]),
      { color:'#facc15', weight:1.5, dashArray:'4 4' }).addTo(map);
  waterDetected = false;
  updateUI();
});

// ── Ray Casting ───────────────────────────────────────────────────
function insidePoly(lat, lng, ring) {
  let inside = false;
  for (let i=0, j=ring.length-1; i<ring.length; j=i++) {
    const yi=ring[i][0], xi=ring[i][1];
    const yj=ring[j][0], xj=ring[j][1];
    if (((yi>lat)!==(yj>lat))&&(lng<(xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

// ── 위경도 → 타일 좌표 변환 ──────────────────────────────────────
function latlngToTile(lat, lng, zoom) {
  const n = Math.pow(2, zoom);
  const x = Math.floor((lng + 180) / 360 * n);
  const latRad = lat * Math.PI / 180;
  const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1/Math.cos(latRad)) / Math.PI) / 2 * n);
  return { x, y };
}

// 타일 내 픽셀 좌표
function latlngToPixel(lat, lng, zoom, tileX, tileY) {
  const n   = Math.pow(2, zoom);
  const px  = (lng + 180) / 360 * n * 256;
  const latRad = lat * Math.PI / 180;
  const py  = (1 - Math.log(Math.tan(latRad)+1/Math.cos(latRad))/Math.PI)/2 * n * 256;
  return {
    px: px - tileX * 256,
    py: py - tileY * 256
  };
}

// ── 타일 이미지 로드 ──────────────────────────────────────────────
function loadTile(z, x, y) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const sub = ['a','b','c'][Math.abs(x+y) % 3];
    img.src = `https://${sub}.tile.openstreetmap.org/${z}/${x}/${y}.png`;
    img.onload  = () => resolve(img);
    img.onerror = () => resolve(null); // 실패해도 계속
  });
}

// ── 픽셀이 물인지 판별 ────────────────────────────────────────────
// OSM 기본 타일에서 물은 #aad3df (R:170 G:211 B:223) 계열
function isWaterPixel(r, g, b) {
  // 물 색상 범위 (OSM 기본 스타일)
  return (
    r >= 140 && r <= 200 &&
    g >= 190 && g <= 230 &&
    b >= 210 && b <= 255 &&
    b > g && g > r        // B > G > R (파란색 계열)
  );
}

// ── 수계 감지 ─────────────────────────────────────────────────────
async function detectWater() {
  if (points.length < 3) return;
  waterSet.clear();
  waterDetected = false;

  // 후보 격자 먼저 계산
  const lats   = points.map(p=>p.lat);
  const lngs   = points.map(p=>p.lng);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const midLat = (minLat+maxLat)/2;
  const GRID_M   = parseInt(document.getElementById('gridM').value);
  const LAT_STEP = GRID_M / 111_000;
  const LNG_STEP = GRID_M / (111_000*Math.cos(midLat*Math.PI/180));
  const regionCoords = points.map(p=>[p.lat,p.lng]);

  allCandidates = [];
  let gid = 0;
  let lat = minLat;
  while (lat < maxLat) {
    let lng = minLng;
    while (lng < maxLng) {
      const cLat = lat+LAT_STEP/2, cLng = lng+LNG_STEP/2;
      if (insidePoly(cLat, cLng, regionCoords)) {
        allCandidates.push({ id:gid++, lat, lng, lat2:lat+LAT_STEP, lng2:lng+LNG_STEP, cLat, cLng });
      }
      lng += LNG_STEP;
    }
    lat += LAT_STEP;
  }

  setStatus('수계 감지 중... 타일 픽셀을 분석하고 있어요.', 'loading');
  document.getElementById('statsCard').style.display='block';
  const pb = document.getElementById('progressBar');
  const pf = document.getElementById('progressFill');
  pb.style.display='block'; pf.style.width='0%';

  // 줌 레벨 — 격자 크기에 따라 결정 (너무 작으면 픽셀 부정확)
  const zoom = GRID_M <= 100 ? 16 : GRID_M <= 200 ? 15 : 14;

  // 필요한 타일 수집
  const tileCache = {};
  const total = allCandidates.length;

  for (let i=0; i<total; i++) {
    const g = allCandidates[i];

    // 격자 4개 꼭짓점 좌표 (SW, SE, NE, NW)
    const corners = [
      { lat: g.lat,  lng: g.lng  },   // SW
      { lat: g.lat,  lng: g.lng2 },   // SE
      { lat: g.lat2, lng: g.lng2 },   // NE
      { lat: g.lat2, lng: g.lng  },   // NW
    ];

    const canvas = document.getElementById('tileCanvas');
    const ctx    = canvas.getContext('2d');
    let isWater  = false;

    for (const corner of corners) {
      if (isWater) break;  // 이미 수계로 판정됐으면 나머지 꼭짓점 생략

      const tile = latlngToTile(corner.lat, corner.lng, zoom);
      const key  = `${zoom}/${tile.x}/${tile.y}`;

      if (!tileCache[key]) {
        tileCache[key] = await loadTile(zoom, tile.x, tile.y);
      }
      const img = tileCache[key];
      if (!img) continue;

      canvas.width = 256; canvas.height = 256;
      ctx.drawImage(img, 0, 0);

      const px = latlngToPixel(corner.lat, corner.lng, zoom, tile.x, tile.y);
      const x0 = Math.max(0, Math.min(255, Math.floor(px.px)));
      const y0 = Math.max(0, Math.min(255, Math.floor(px.py)));

      // 꼭짓점 주변 3×3 픽셀 샘플링 — 과반수(5개 이상)가 물이면 해당 꼭짓점을 수계로 판정
      let waterCount = 0;
      for (let dy=-1; dy<=1; dy++) {
        for (let dx=-1; dx<=1; dx++) {
          const sx = Math.max(0, Math.min(255, x0+dx));
          const sy = Math.max(0, Math.min(255, y0+dy));
          const pixel = ctx.getImageData(sx, sy, 1, 1).data;
          if (isWaterPixel(pixel[0], pixel[1], pixel[2])) waterCount++;
        }
      }
      // 꼭짓점 하나라도 수계면 격자 전체를 수계로 판정
      if (waterCount >= 5) isWater = true;
    }

    if (isWater) waterSet.add(g.id);

    // 진행률
    if (i % 20 === 0) {
      pf.style.width = ((i/total)*100).toFixed(0)+'%';
      await new Promise(r => setTimeout(r, 0));
    }
  }

  pf.style.width = '100%';
  pb.style.display = 'none';
  waterDetected = true;

  // 수계 격자 미리 표시
  gridRects.forEach(r=>map.removeLayer(r)); gridRects=[];
  for (const g of allCandidates) {
    if (waterSet.has(g.id)) {
      const r = L.rectangle([[g.lat,g.lng],[g.lat2,g.lng2]], {
        color:'#0ea5e9', weight:0.4, fillColor:'#0ea5e9', fillOpacity:0.35, dashArray:'2 2'
      }).bindTooltip('수계 — 격자 제외').addTo(map);
      gridRects.push(r);
    }
  }

  setStatus(`수계 감지 완료 — ${waterSet.size}개 격자 수계 감지됨. 격자 생성을 눌러주세요`, 'success');
  document.getElementById('gridBtn').disabled = false;
  updateUI();
}

// ── 격자 생성 ─────────────────────────────────────────────────────
function generateGrid() {
  if (!allCandidates.length) return;
  gridRects.forEach(r=>map.removeLayer(r)); gridRects=[];
  gridData=[];

  if (polygon) map.removeLayer(polygon);
  polygon = L.polygon(points.map(p=>[p.lat,p.lng]), {
    color:'#facc15', weight:2, fillColor:'#facc15', fillOpacity:0.04
  }).addTo(map);
  if (polyline) { map.removeLayer(polyline); polyline=null; }
  markers.forEach(m=>map.removeLayer(m)); markers=[];

  const GRID_M = parseInt(document.getElementById('gridM').value);
  let id=1, waterExcl=0;

  for (const g of allCandidates) {
    if (waterSet.has(g.id)) {
      waterExcl++;
      L.rectangle([[g.lat,g.lng],[g.lat2,g.lng2]], {
        color:'#0ea5e9', weight:0.3, fillColor:'#0ea5e9', fillOpacity:0.2, dashArray:'2 2'
      }).bindTooltip('수계 제외').addTo(map);
    } else {
      gridData.push({
        id,
        centerLat: parseFloat(g.cLat.toFixed(6)),
        centerLng: parseFloat(g.cLng.toFixed(6)),
        swLat: parseFloat(g.lat.toFixed(6)),
        swLng: parseFloat(g.lng.toFixed(6)),
        neLat: parseFloat(g.lat2.toFixed(6)),
        neLng: parseFloat(g.lng2.toFixed(6)),
      });
      const r = L.rectangle([[g.lat,g.lng],[g.lat2,g.lng2]], {
        color:'#60a5fa', weight:0.5, fillColor:'#60a5fa', fillOpacity:0.12
      }).bindTooltip(`격자 ${id} | ${g.cLat.toFixed(5)}, ${g.cLng.toFixed(5)}`).addTo(map);
      gridRects.push(r);
      id++;
    }
  }

  document.getElementById('r-total').textContent = allCandidates.length.toLocaleString()+'개';
  document.getElementById('r-water').textContent = waterExcl.toLocaleString()+'개';
  document.getElementById('r-count').textContent = gridData.length.toLocaleString()+'개';
  document.getElementById('r-size').textContent = GRID_M+'m × '+GRID_M+'m';
  document.getElementById('statsCard').style.display='block';

  const header = 'grid_id,center_lat,center_lng,sw_lat,sw_lng,ne_lat,ne_lng';
  const rows   = gridData.slice(0,10).map(g=>
    `${g.id},${g.centerLat},${g.centerLng},${g.swLat},${g.swLng},${g.neLat},${g.neLng}`
  );
  document.getElementById('previewText').innerHTML =
    `<span class="head">${header}</span>\n` + rows.join('\n') +
    (gridData.length>10 ? `\n<span style="color:#555">... 외 ${gridData.length-10}행</span>` : '');
  document.getElementById('preview').style.display='block';
  document.getElementById('csvBtn').disabled=false;
  document.getElementById('gridBtn').disabled=true;
  gridDone=true;
  setStatus(`완료 — 유효 격자 ${gridData.length}개 (수계 ${waterExcl}개 제외)`, 'success');
  updateUI();
}

// ── CSV + JSON 저장 ───────────────────────────────────────────────
function downloadCSV() {
  const customName = document.getElementById('csvFilename').value.trim();
  const defaultName = `grid_${document.getElementById('gridM').value}m_${gridData.length}cells`;
  const baseName = (customName || defaultName).replace(/\.csv$/i,'');

  // ── CSV ──
  const header = 'grid_id,center_lat,center_lng,sw_lat,sw_lng,ne_lat,ne_lng';
  const rows   = gridData.map(g=>
    `${g.id},${g.centerLat},${g.centerLng},${g.swLat},${g.swLng},${g.neLat},${g.neLng}`
  );
  const csvLink = Object.assign(document.createElement('a'), {
    href:     URL.createObjectURL(new Blob([[header,...rows].join('\n')],{type:'text/csv'})),
    download: baseName + '.csv'
  });
  csvLink.click();

  // ── JSON (polygon_coords) ──
  const polygonJson = JSON.stringify({
    polygon_coords: points.map(p => [
      parseFloat(p.lat.toFixed(6)),
      parseFloat(p.lng.toFixed(6))
    ]),
    grid_size_m: parseInt(document.getElementById('gridM').value),
    grid_count:  gridData.length,
    saved_at:    new Date().toISOString()
  }, null, 2);

  const jsonLink = Object.assign(document.createElement('a'), {
    href:     URL.createObjectURL(new Blob([polygonJson], {type:'application/json'})),
    download: baseName + '_polygon.json'
  });
  jsonLink.click();
}

// ── 취소 / 초기화 ─────────────────────────────────────────────────
function undoPoint() {
  if (!points.length || gridDone) return;
  points.pop();
  const m = markers.pop(); if(m) map.removeLayer(m);
  if(polyline){map.removeLayer(polyline);polyline=null;}
  if(points.length>=2)
    polyline=L.polyline(points.map(p=>[p.lat,p.lng]),{color:'#facc15',weight:1.5,dashArray:'4 4'}).addTo(map);
  waterDetected=false; updateUI();
}

function clearAll() {
  points=[]; markers.forEach(m=>map.removeLayer(m)); markers=[];
  gridRects.forEach(r=>map.removeLayer(r)); gridRects=[];
  if(polyline){map.removeLayer(polyline);polyline=null;}
  if(polygon) {map.removeLayer(polygon); polygon=null;}
  gridData=[]; allCandidates=[]; waterSet.clear();
  waterDetected=false; gridDone=false;
  ['statsCard','preview'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('csvBtn').disabled=true;
  setStatus('지도를 클릭해서 꼭짓점을 찍으세요 (최소 3개)', 'info');
  updateUI();
}

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-box';
  if (type === 'loading') el.classList.add('loading');
  else if (type === 'success') el.classList.add('success');
  else if (type === 'info') el.classList.add('info');
}

function updateUI() {
  const n=points.length, done=gridDone;
  document.getElementById('undoBtn').disabled  = n===0||done;
  document.getElementById('clearBtn').disabled = n===0&&!gridData.length;
  document.getElementById('waterBtn').disabled = n<3||done;
  document.getElementById('gridBtn').disabled  = !waterDetected||done||allCandidates.length===0;
  const list=document.getElementById('coordsList');
  list.innerHTML = n===0
    ? '<div class="coords-empty">아직 없음</div>'
    : points.map((p,i)=>`
        <div class="coord-item">
          <span class="coord-num">${i+1}</span>
          <span class="coord-text">${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}</span>
        </div>`).join('');
}

updateUI();
</script>
